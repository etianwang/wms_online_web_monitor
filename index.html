<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弘盛机电 · 非洲库存查看器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN SYSTEM — Industrial Precision Theme
   深色工业风，带橙色强调色，对应"机电"行业特性
   ================================================================ */
:root {
  --bg-base:      #0d0f12;
  --bg-panel:     #141720;
  --bg-card:      #1a1e2a;
  --bg-hover:     #212535;
  --border:       #2a2f3e;
  --border-light: #353b50;
  --accent:       #f97316;
  --accent-dim:   rgba(249,115,22,0.15);
  --accent-glow:  rgba(249,115,22,0.35);
  --green:        #22c55e;
  --yellow:       #eab308;
  --red:          #ef4444;
  --blue:         #3b82f6;
  --text-primary: #e8eaf0;
  --text-secondary: #8892a4;
  --text-muted:   #4a5266;
  --row-even:     rgba(255,255,255,0.025);
  --row-odd:      transparent;
  --row-warning:  rgba(234,179,8,0.12);
  --row-danger:   rgba(239,68,68,0.15);
  --row-selected: rgba(249,115,22,0.1);
  --font-body:    'Noto Sans SC', sans-serif;
  --font-mono:    'Space Mono', monospace;
  --sidebar-w:    220px;
  --header-h:     56px;
  --radius:       8px;
  --radius-sm:    4px;
  --transition:   0.18s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 13px;
  overflow: hidden;
}

/* ================================================================
   LAYOUT
   ================================================================ */
#app { display: flex; flex-direction: column; height: 100vh; }

/* --- Header --- */
#header {
  height: var(--header-h);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--text-primary);
}

.logo-sub {
  font-size: 10px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  margin-top: 1px;
}

#conn-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
  transition: background var(--transition);
}
.status-dot.ok     { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.error  { background: var(--red);   box-shadow: 0 0 6px var(--red); }
.status-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

#btn-refresh-header {
  margin-left: 12px;
  padding: 5px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.04em;
}
#btn-refresh-header:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* --- Main body split --- */
#main-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* --- Sidebar --- */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-section-title {
  padding: 14px 16px 8px;
  font-size: 10px;
  font-family: var(--font-mono);
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
}

#table-list { flex: 1; overflow-y: auto; }

.table-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 2px solid transparent;
  color: var(--text-secondary);
  font-size: 13px;
}
.table-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.table-item.active {
  background: var(--accent-dim);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}
.table-icon { font-size: 15px; }

/* --- Content area --- */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-base);
}

/* Table name bar */
#content-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

#content-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

#content-meta {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-left: auto;
}

#btn-export {
  padding: 6px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  display: none;
}
#btn-export:hover { background: var(--accent); color: #000; }

/* ================================================================
   FILTER PANEL
   ================================================================ */
#filter-panel {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  display: none;
}

.filter-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

.filter-field label {
  display: block;
  font-size: 10px;
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.filter-field input,
.filter-field select {
  width: 100%;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 12px;
  outline: none;
  transition: border-color var(--transition);
}
.filter-field input:focus,
.filter-field select:focus { border-color: var(--accent); }

.filter-field select option { background: var(--bg-panel); }

.filter-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn-primary {
  padding: 7px 18px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all var(--transition);
}
.btn-primary:hover { background: #ea6c00; }

.btn-ghost {
  padding: 7px 18px;
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all var(--transition);
}
.btn-ghost:hover { border-color: var(--text-secondary); color: var(--text-primary); }

/* ================================================================
   STATS BAR
   ================================================================ */
#stats-bar {
  padding: 8px 20px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: none;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}
.stat-chip .val { color: var(--text-primary); font-weight: 700; }
.stat-chip .dot-g { color: var(--green); }
.stat-chip .dot-y { color: var(--yellow); }
.stat-chip .dot-r { color: var(--red); }

/* ================================================================
   TABLE
   ================================================================ */
#table-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}

thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
  cursor: pointer;
}
thead th:hover { color: var(--accent); }
thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
thead th.sorted-asc  .sort-icon,
thead th.sorted-desc .sort-icon { opacity: 1; color: var(--accent); }

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background var(--transition);
  cursor: default;
}
tbody tr:nth-child(even) { background: var(--row-even); }
tbody tr.row-warning { background: var(--row-warning) !important; }
tbody tr.row-danger  { background: var(--row-danger)  !important; }
tbody tr:hover { background: var(--bg-hover) !important; }

tbody td {
  padding: 8px 12px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 320px;
}

/* Status badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-green  { background: rgba(34,197,94,0.15);  color: var(--green); }
.badge-yellow { background: rgba(234,179,8,0.15);  color: var(--yellow); }
.badge-red    { background: rgba(239,68,68,0.15);   color: var(--red); }
.badge-blue   { background: rgba(59,130,246,0.15);  color: var(--blue); }

/* ================================================================
   LOADING / EMPTY STATES
   ================================================================ */
#overlay {
  position: absolute;
  inset: 0;
  background: rgba(13,15,18,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
#overlay.visible { opacity: 1; pointer-events: all; }

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { color: var(--text-secondary); font-family: var(--font-mono); font-size: 12px; }

#empty-state {
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  height: 100%;
  color: var(--text-muted);
}
#empty-state .empty-icon { font-size: 48px; opacity: 0.3; }
#empty-state .empty-text { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.06em; }

/* ================================================================
   TOAST
   ================================================================ */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
}
.toast {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  color: #fff;
  animation: toastIn 0.25s ease forwards;
  max-width: 360px;
}
.toast.ok    { background: rgba(34,197,94,0.9); }
.toast.error { background: rgba(239,68,68,0.9); }
.toast.info  { background: rgba(59,130,246,0.9); }
@keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div id="app">

  <!-- ===== HEADER ===== -->
  <header id="header">
    <div class="logo">
      <div class="logo-icon">⚙</div>
      <div>
        <div class="logo-text">弘盛机电</div>
        <div class="logo-sub">AFRICA INVENTORY SYSTEM</div>
      </div>
    </div>
    <div id="conn-status">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">正在连接...</span>
    </div>
    <button id="btn-refresh-header" onclick="init()">↻ 刷新</button>
  </header>

  <!-- ===== MAIN ===== -->
  <div id="main-body">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-section-title">数据表</div>
      <div id="table-list">
        <div class="table-item" style="color:var(--text-muted)">
          <span>正在加载...</span>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <div id="content">

      <!-- Content header -->
      <div id="content-header">
        <div id="content-title" style="color:var(--text-muted)">← 请选择一张数据表</div>
        <div id="content-meta"></div>
        <button id="btn-export" onclick="exportCSV()">↓ 导出 CSV</button>
      </div>

      <!-- Filter panel -->
      <div id="filter-panel">
        <!-- Inventory filters -->
        <div id="inv-filters" style="display:none">
          <div class="filter-grid">
            <div class="filter-field">
              <label>物品名称</label>
              <input id="inv-keyword" type="text" placeholder="关键字搜索...">
            </div>
            <div class="filter-field">
              <label>材料类型</label>
              <select id="inv-category"><option>全部</option></select>
            </div>
            <div class="filter-field">
              <label>专业</label>
              <select id="inv-domain"><option>全部</option></select>
            </div>
            <div class="filter-field">
              <label>储存位置</label>
              <select id="inv-location"><option>全部</option></select>
            </div>
            <div class="filter-field">
              <label>柜号</label>
              <select id="inv-cabinet"><option>全部</option></select>
            </div>
            <div class="filter-field">
              <label>状态</label>
              <select id="inv-status">
                <option value="全部">全部</option>
                <option value="normal">🟢 正常 (Normal)</option>
                <option value="low">🟡 预警 (Low Stock)</option>
                <option value="out">🔴 缺货 (Stock Out)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Transactions filters -->
        <div id="trans-filters" style="display:none">
          <div class="filter-grid">
            <div class="filter-field">
              <label>物品名称</label>
              <input id="trans-keyword" type="text" placeholder="关键字搜索...">
            </div>
            <div class="filter-field">
              <label>类型</label>
              <select id="trans-type">
                <option>全部</option>
                <option value="IN">IN（入库）</option>
                <option value="OUT">OUT（出库）</option>
              </select>
            </div>
            <div class="filter-field">
              <label>项目</label>
              <select id="trans-project"><option>全部</option></select>
            </div>
            <div class="filter-field">
              <label>起始日期</label>
              <input id="trans-start" type="date">
            </div>
            <div class="filter-field">
              <label>截止日期</label>
              <input id="trans-end" type="date">
            </div>
          </div>
        </div>

        <div class="filter-actions">
          <button class="btn-primary" onclick="applyFilters()">🔍 应用筛选</button>
          <button class="btn-ghost" onclick="resetFilters()">✕ 重置</button>
        </div>
      </div>

      <!-- Stats bar -->
      <div id="stats-bar"></div>

      <!-- Table wrap -->
      <div id="table-wrap">
        <div id="overlay">
          <div class="spinner"></div>
          <div class="overlay-text" id="overlay-text">加载中...</div>
        </div>
        <div id="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">无数据 / 请选择数据表</div>
        </div>
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

    </div><!-- /content -->
  </div><!-- /main-body -->
</div><!-- /app -->

<!-- Toast container -->
<div id="toast-container"></div>

<script>
/* ================================================================
   CONFIG
   ================================================================ */
const API = 'api.php'; // 与 api.php 同目录

/* ================================================================
   STATE
   ================================================================ */
const state = {
  currentTable: null,   // 'inventory' | 'transactions'
  actualNames: {},      // { inventory: 'inventory', transactions: 'transactions' }
  filterOpts: {},       // loaded filter options
  sortCol: null,
  sortDir: 'asc',
  rawRows: [],          // last fetched rows for client-sort
  columns: [],          // current column defs
};

/* ================================================================
   COLUMN DEFINITIONS
   ================================================================ */
const COL_DEFS = {
  inventory: [
    { key: 'name',          label: '物品名称',   width: 240 },
    { key: 'reference',     label: '物品型号',   width: 160 },
    { key: 'category',      label: '材料类型',   width: 110 },
    { key: 'domain',        label: '专业',       width: 100 },
    { key: 'unit',          label: '单位',       width: 60  },
    { key: 'current_stock', label: '当前库存',   width: 80  },
    { key: 'min_stock',     label: '最低库存',   width: 80  },
    { key: 'location',      label: '储存位置',   width: 100 },
    { key: 'cabinet',       label: '柜号',       width: 80  },
    { key: '_status',       label: '状态',       width: 140, virtual: true },
  ],
  transactions: [
    { key: 'id',               label: '序号',       width: 70  },
    { key: 'date',             label: '日期时间',   width: 160 },
    { key: 'item_name',        label: '物品名称',   width: 280 },
    { key: 'type',             label: '类型',       width: 80  },
    { key: 'quantity',         label: '数量',       width: 70  },
    { key: 'recipient_source', label: '来源/接收人', width: 140 },
    { key: 'project_ref',      label: '项目',       width: 120 },
  ],
};

/* ================================================================
   API HELPERS
   ================================================================ */
async function apiFetch(params) {
  const url = API + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '未知错误');
  return json.data;
}

/* ================================================================
   INIT
   ================================================================ */
async function init() {
  setStatus('loading', '正在连接...');
  showOverlay('连接数据库...');

  try {
    await apiFetch({ action: 'ping' });
    setStatus('ok', '已连接');
  } catch(e) {
    setStatus('error', '连接失败');
    toast('数据库连接失败: ' + e.message, 'error');
    hideOverlay();
    return;
  }

  await loadTables();
  await loadFilterOptions();
  hideOverlay();
}

/* ================================================================
   TABLE LIST (SIDEBAR)
   ================================================================ */
const TABLE_ICONS = { '库存': '📦', '存取记录': '📋', '同步状态': '🔄' };

async function loadTables() {
  try {
    const tables = await apiFetch({ action: 'tables' });
    state.actualNames = {};
    tables.forEach(t => {
      state.actualNames[t.actual.toLowerCase()] = t.actual;
    });

    const listEl = document.getElementById('table-list');
    listEl.innerHTML = '';
    tables.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'table-item';
      el.dataset.actual = t.actual;
      el.dataset.clean = t.actual.toLowerCase();
      el.innerHTML = `<span class="table-icon">${TABLE_ICONS[t.display] || '🗃'}</span><span>${t.display}</span>`;
      el.onclick = () => selectTable(el);
      listEl.appendChild(el);
      // Auto-select first
      if (i === 0) selectTable(el);
    });
  } catch(e) {
    toast('获取表列表失败: ' + e.message, 'error');
  }
}

function selectTable(el) {
  document.querySelectorAll('.table-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');

  const clean = el.dataset.clean;
  state.currentTable = clean;
  state.sortCol = null;
  state.sortDir = 'asc';

  showFilterPanel(clean);
  resetFilters(false);
  loadData();
}

/* ================================================================
   FILTER OPTIONS
   ================================================================ */
async function loadFilterOptions() {
  try {
    const inv   = state.actualNames['inventory']    || 'inventory';
    const trans = state.actualNames['transactions'] || 'transactions';
    const opts  = await apiFetch({ action: 'filter_opts', inventory_table: inv, transactions_table: trans });
    state.filterOpts = opts;
    populateSelect('inv-category', opts.inventory?.category);
    populateSelect('inv-domain',   opts.inventory?.domain);
    populateSelect('inv-location', opts.inventory?.location);
    populateSelect('inv-cabinet',  opts.inventory?.cabinet);
    populateSelect('trans-project', opts.transactions?.project);
  } catch(e) {
    toast('筛选选项加载失败: ' + e.message, 'error');
  }
}

function populateSelect(id, items) {
  if (!items) return;
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="全部">全部</option>';
  items.forEach(v => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = v;
    sel.appendChild(opt);
  });
  // Restore selection if still valid
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

/* ================================================================
   FILTER PANEL
   ================================================================ */
function showFilterPanel(clean) {
  const panel = document.getElementById('filter-panel');
  const invF  = document.getElementById('inv-filters');
  const traF  = document.getElementById('trans-filters');
  const statsBar = document.getElementById('stats-bar');

  if (clean === 'inventory' || clean === 'transactions') {
    panel.style.display = 'block';
    invF.style.display  = clean === 'inventory' ? 'block' : 'none';
    traF.style.display  = clean === 'transactions' ? 'block' : 'none';
    statsBar.style.display = 'flex';
  } else {
    panel.style.display = 'none';
    statsBar.style.display = 'none';
  }
}

function resetFilters(reload = true) {
  document.getElementById('inv-keyword').value = '';
  document.getElementById('inv-category').value = '全部';
  document.getElementById('inv-domain').value = '全部';
  document.getElementById('inv-location').value = '全部';
  document.getElementById('inv-cabinet').value = '全部';
  document.getElementById('inv-status').value = '全部';

  document.getElementById('trans-keyword').value = '';
  document.getElementById('trans-type').value = '全部';
  document.getElementById('trans-project').value = '全部';

  // Default dates: start = first of month, end = today
  const today = new Date();
  const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('trans-start').value = fmt(firstOfMonth);
  document.getElementById('trans-end').value   = fmt(today);

  if (reload && state.currentTable) loadData();
}

function applyFilters() { loadData(); }

function fmt(d) { return d.toISOString().slice(0,10); }

/* ================================================================
   LOAD DATA
   ================================================================ */
async function loadData() {
  const clean = state.currentTable;
  if (!clean) return;

  const title = document.getElementById('content-title');
  title.textContent = `⏳ 正在加载...`;
  showOverlay('查询数据库...');

  try {
    let result;
    if (clean === 'inventory') {
      result = await apiFetch({
        action:   'inventory',
        table:    state.actualNames['inventory'] || 'inventory',
        keyword:  document.getElementById('inv-keyword').value,
        category: document.getElementById('inv-category').value,
        domain:   document.getElementById('inv-domain').value,
        location: document.getElementById('inv-location').value,
        cabinet:  document.getElementById('inv-cabinet').value,
        status:   document.getElementById('inv-status').value,
      });
    } else if (clean === 'transactions') {
      result = await apiFetch({
        action:            'transactions',
        table:             state.actualNames['transactions'] || 'transactions',
        inventory_table:   state.actualNames['inventory'] || 'inventory',
        keyword:           document.getElementById('trans-keyword').value,
        type:              document.getElementById('trans-type').value,
        project:           document.getElementById('trans-project').value,
        start_date:        document.getElementById('trans-start').value,
        end_date:          document.getElementById('trans-end').value,
      });
    } else {
      // Fallback for sync_status or others — not directly supported but won't crash
      hideOverlay();
      return;
    }

    state.rawRows = result.rows;
    state.columns = COL_DEFS[clean] || [];

    renderTable(result.rows);
    renderStats(result.stats, clean);

    const limit = result.total === 1000 ? ' (已限制 1000 行)' : '';
    title.textContent = `✅ ${displayName(clean)} — ${result.total} 行${limit}`;
    document.getElementById('content-meta').textContent = `查询耗时 ${result.duration}s`;
    document.getElementById('btn-export').style.display = 'inline-block';
  } catch(e) {
    toast('数据加载失败: ' + e.message, 'error');
    document.getElementById('content-title').textContent = '❌ 加载失败';
  } finally {
    hideOverlay();
  }
}

/* ================================================================
   RENDER TABLE
   ================================================================ */
function renderTable(rows) {
  const clean = state.currentTable;
  const cols  = state.columns;

  // --- Head ---
  const thead = document.getElementById('table-head');
  thead.innerHTML = '';
  const tr = document.createElement('tr');
  cols.forEach((col, i) => {
    const th = document.createElement('th');
    th.dataset.key = col.key;
    th.style.minWidth = col.width + 'px';
    let icon = '⇅';
    if (state.sortCol === col.key) icon = state.sortDir === 'asc' ? '↑' : '↓';
    th.innerHTML = `${col.label}<span class="sort-icon">${icon}</span>`;
    if (state.sortCol === col.key) th.className = 'sorted-' + state.sortDir;
    if (!col.virtual) {
      th.onclick = () => sortBy(col.key);
    }
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  // --- Body ---
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  if (!rows || rows.length === 0) {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('data-table').style.display = 'none';
    return;
  }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('data-table').style.display = '';

  rows.forEach(row => {
    const tr = document.createElement('tr');

    if (clean === 'inventory') {
      const cur = parseInt(row.current_stock ?? -1);
      const min = parseInt(row.min_stock ?? 0);
      if (cur === 0)              tr.className = 'row-danger';
      else if (cur > 0 && cur < min) tr.className = 'row-warning';
    }

    cols.forEach(col => {
      const td = document.createElement('td');
      td.title = row[col.key] ?? '';

      if (col.key === '_status') {
        // Virtual status column
        const cur = parseInt(row.current_stock ?? -1);
        const min = parseInt(row.min_stock ?? 0);
        if (cur === 0)
          td.innerHTML = `<span class="badge badge-red">🔴 缺货</span>`;
        else if (cur > 0 && cur < min)
          td.innerHTML = `<span class="badge badge-yellow">🟡 预警</span>`;
        else
          td.innerHTML = `<span class="badge badge-green">🟢 正常</span>`;
      } else if (col.key === 'type') {
        const v = row[col.key] ?? '';
        td.innerHTML = v === 'IN'
          ? `<span class="badge badge-green">↑ IN</span>`
          : `<span class="badge badge-blue">↓ OUT</span>`;
      } else {
        const v = row[col.key];
        td.textContent = v === null || v === undefined ? '—' : String(v);
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

/* ================================================================
   CLIENT-SIDE SORT
   ================================================================ */
function sortBy(key) {
  if (state.sortCol === key) {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sortCol = key;
    state.sortDir = 'asc';
  }

  const sorted = [...state.rawRows].sort((a, b) => {
    let av = a[key] ?? '', bv = b[key] ?? '';
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) { av = an; bv = bn; }
    if (av < bv) return state.sortDir === 'asc' ? -1 : 1;
    if (av > bv) return state.sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  renderTable(sorted);
}

/* ================================================================
   STATS BAR
   ================================================================ */
function renderStats(stats, clean) {
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = '';
  if (!stats) return;

  let html = '';
  if (clean === 'inventory') {
    html = `
      <div class="stat-chip">总行数 <span class="val">${stats.total}</span></div>
      <div class="stat-chip">类型 <span class="val">${stats.categories}</span> 个</div>
      <div class="stat-chip">专业 <span class="val">${stats.domains}</span> 个</div>
      <div class="stat-chip">位置 <span class="val">${stats.locations}</span> 个</div>
      <div class="stat-chip">柜号 <span class="val">${stats.cabinets}</span> 个</div>
      <div class="stat-chip"><span class="dot-y">🟡</span> 预警 <span class="val">${stats.warning}</span></div>
      <div class="stat-chip"><span class="dot-r">🔴</span> 缺货 <span class="val">${stats.out}</span></div>
    `;
  } else if (clean === 'transactions') {
    html = `
      <div class="stat-chip">总行数 <span class="val">${stats.total}</span></div>
      <div class="stat-chip"><span class="dot-g">↑</span> 入库 <span class="val">${stats.in}</span></div>
      <div class="stat-chip"><span class="dot-r">↓</span> 出库 <span class="val">${stats.out}</span></div>
      <div class="stat-chip">类型 <span class="val">${stats.categories}</span> 个</div>
      <div class="stat-chip">项目 <span class="val">${stats.projects}</span> 个</div>
    `;
  }
  bar.innerHTML = html;
}

/* ================================================================
   EXPORT CSV
   ================================================================ */
function exportCSV() {
  const clean = state.currentTable;
  if (!clean) return;

  const params = new URLSearchParams({ action: 'export', table_type: clean });

  if (clean === 'inventory') {
    params.set('table',    state.actualNames['inventory'] || 'inventory');
    params.set('keyword',  document.getElementById('inv-keyword').value);
    params.set('category', document.getElementById('inv-category').value);
    params.set('domain',   document.getElementById('inv-domain').value);
    params.set('location', document.getElementById('inv-location').value);
    params.set('cabinet',  document.getElementById('inv-cabinet').value);
    params.set('status',   document.getElementById('inv-status').value);
  } else {
    params.set('table',           state.actualNames['transactions'] || 'transactions');
    params.set('inventory_table', state.actualNames['inventory'] || 'inventory');
    params.set('keyword',         document.getElementById('trans-keyword').value);
    params.set('type',            document.getElementById('trans-type').value);
    params.set('project',         document.getElementById('trans-project').value);
    params.set('start_date',      document.getElementById('trans-start').value);
    params.set('end_date',        document.getElementById('trans-end').value);
  }

  const a = document.createElement('a');
  a.href = API + '?' + params.toString();
  a.download = '';
  a.click();
  toast('CSV 导出已开始下载', 'ok');
}

/* ================================================================
   UI HELPERS
   ================================================================ */
function showOverlay(text = '加载中...') {
  document.getElementById('overlay-text').textContent = text;
  document.getElementById('overlay').classList.add('visible');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('visible');
}

function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + type;
  document.getElementById('status-text').textContent = text;
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function displayName(clean) {
  return { inventory: '库存', transactions: '存取记录' }[clean] || clean;
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
    applyFilters();
  }
});

/* ================================================================
   BOOT
   ================================================================ */
init();
</script>
